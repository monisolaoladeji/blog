{% extends "base.html" %}

{% block title %}{{ post.title }} | MiniPosts{% endblock %}

{% block content %}
<section class="page-head">
    <a class="breadcrumb" href="{{ url_for('index') }}">← Back to posts</a>
    <h1>{{ post.title }}</h1>
    <p class="muted">Created {{ post.created_at }} • Updated {{ post.updated_at }}</p>
</section>

<article class="card">
    <div class="prose">
        {{ post.content | e | replace('\n', '<br>') | safe }}
    </div>

    <div class="card-meta">
        <div class="card-actions">
            <a class="btn btn-ghost" href="{{ url_for('edit_post', post_id=post.id) }}">Edit</a>
            <form method="post" action="{{ url_for('delete_post', post_id=post.id) }}" onsubmit="return confirm('Delete this post?');">
                <button class="btn btn-danger" type="submit">Delete</button>
            </form>
        </div>
    </div>
</article>
{% endblock %}
